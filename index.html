<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA Rogério Cestas Básicas</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5efe6;
    text-align: center;
}

.container {
    position: relative;
    max-width: 1000px;
    margin: auto;
}

img {
    width: 100%;
    height: auto;
}

/* TEXTO CHAMATIVO */

@media (max-width: 600px) {
.aviso {
    font-size: 18px;
    padding: 10px;
    width: 90%;
    text-align: center;
    margin: 10px auto
    position: relative; 
    transform: translateX(-50%);
    background: #ffcc00;
    color: #3b2a1a;    
    border-radius: 30px;    
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    animation: pulseText 1.5s infinite;
}

@keyframes pulseText {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.1); }
    100% { transform: translateX(-50%) scale(1); }
}

/* ÁREAS CLICÁVEIS GRANDES */
.link {
    position: absolute;
    top: 35%;
    width: 20%;
    height: 60%;
    cursor: pointer;
    transition: 0.3s;
}

/* EFEITO VISUAL */
.link:hover {
    background: rgba(255, 255, 255, 0.25);
    border-radius: 15px;
    transform: scale(1.02);
}

/* POSIÇÕES */
.c1 { left: 5%; }
.c2 { left: 27%; }
.c3 { left: 49%; }
.c4 { left: 71%; }

/* BOTÃO FLUTUANTE */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #25d366;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    animation: pulse 1.5s infinite;
}

.whatsapp-float img {
    width: 35px;
    height: 35px;

}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

</style>
</head>

<body>

<div class="container">

    <!-- TEXTO -->
    <div class="aviso">
        👇 Clique na cesta para pedir pelo WhatsApp
    </div>

    <!-- IMAGEM -->
    <img src="cardapio.png" alt="Cestas básicas">

    <!-- LINKS -->
    <a class="link c1" href="https://wa.me/5516991795522?text=Olá,%20quero%20a%20Cesta%20Doação%2001"></a>

    <a class="link c2" href="https://wa.me/5516991795522?text=Olá,%20quero%20a%20Cesta%20Doação%2002"></a>

    <a class="link c3" href="https://wa.me/5516991795522?text=Olá,%20quero%20a%20Cesta%20Doação%2003"></a>

    <a class="link c4" href="https://wa.me/5516991795522?text=Olá,%20quero%20a%20Cesta%20Família"></a>

</div>

<!-- BOTÃO FLUTUANTE -->
<a class="whatsapp-float" href="https://wa.me/5516991795522" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
</a>

</body>
</html>
